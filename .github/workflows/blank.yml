name: Deploy to Environment

on:
  push:
    branches:
      - DEV_BRANCH

  workflow_dispatch:

env:
  COA_VERSION: 7.31.3

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # ✅ Write COA config safely
      - name: Write COA_CONFIG
        run: |
          printf "%s" '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      # ✅ Validate JSON (debug)
      - name: Validate COA_CONFIG
        run: |
          echo "=== COA_CONFIG Preview ==="
          cat COA_CONFIG
          echo ""
          echo "=== Validating JSON ==="
          jq . COA_CONFIG
    
      # Install Coalesce CLI tool
      - run: npm list | grep "@coalescesoftware/coa@${{ env.COA_VERSION }}" || npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      # Print version
      - run: npx coa --version

      # Create Deployment Plan
      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      # Deploy Plan
      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug
