name: Deploy to Environment

permissions:
  contents: write

on:
  push:
    branches:
      - DEV_BRANCH

  workflow_dispatch:

env:
  COA_VERSION: 7.31.3

jobs:
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: DEV_ENV

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - run: npm list | grep "@coalescesoftware/coa@${{ env.COA_VERSION }}" || npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      - run: npx coa --version

      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug

  merge-dev-into-qa:
    name: Merge DEV to QA
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v6
        with:
          ref: QA_BRANCH
          
      - name: Configure Git
        run: |
          git config user.name "RonakSurana-2001"
          git config user.email "ronaksurana2017@gmail.com"
          
          git fetch origin
          # Checkout QA branch
          git checkout QA_BRANCH || git checkout -b QA_BRANCH origin/QA_BRANCH

          # Get latest commit from DEV
          LATEST_COMMIT=$(git rev-parse origin/DEV_BRANCH)

          echo "Latest DEV commit: $LATEST_COMMIT"

          # Cherry-pick that commit into QA
          git cherry-pick $LATEST_COMMIT

          # Push changes
          git push origin QA_BRANCH
