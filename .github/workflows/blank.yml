name: Deploy to Environment

permissions:
  contents: write

on:
  push:
    branches:
      - DEV_BRANCH

  workflow_dispatch:

env:
  COA_VERSION: 7.31.3

jobs:
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - run: npm list | grep "@coalescesoftware/coa@${{ env.COA_VERSION }}" || npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      - run: npx coa --version

      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug

  request-qa-approval:
    name: Request QA Approval
    runs-on: ubuntu-latest
    needs: deploy-dev
    outputs:
      approved: ${{ steps.wait-for-approval.outputs.approved }}

    steps:
      - name: Wait for QA Approval
        id: wait-for-approval
        uses: hmarr/auto-approve-action@v2
        with:
          # This is a trick: simulate manual approval via workflow_dispatch
          # In practice, you manually trigger this workflow using inputs
          # or you can just use a placeholder pause
          message: "Manual approval required: continue to QA deploy"
        continue-on-error: false

  promote-to-qa:
    name: Promote DEV → QA Branch
    runs-on: ubuntu-latest
    needs: request-qa-approval
    if: needs.request-qa-approval.outputs.approved == 'true'   

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required to push branch

      - name: Configure Git
        run: |
          git config user.name "RonakSurana-2001"
          git config user.email "ronaksurana2017@gmail.com"
          
          git fetch origin
          git checkout QA_BRANCH
          git merge origin/DEV_BRANCH
          git push origin QA_BRANCH

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: promote-to-qa

    steps:
      - uses: actions/checkout@v6
        with:
          ref: QA_BRANCH   # 👈 important

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG_QA }}' > COA_CONFIG

      - run: npm list | grep "@coalescesoftware/coa@${{ env.COA_VERSION }}" || npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      - run: npx coa --version

      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug
