name: Deploy to DEV Environment

permissions:
  contents: write

on:
  push:
    branches:
      - DEV_BRANCH

  workflow_dispatch:

env:
  COA_VERSION: 7.31.3

jobs:
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: DEV_ENV

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - run: npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug


  merge-dev-into-qa:
    name: Merge DEV to QA
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      # ✅ Debug step inside steps
      - name: Debug PAT token
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "PAT_TOKEN is empty ❌"
            exit 1
          else
            echo "PAT_TOKEN is set ✅"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Sync DEV → QA
        run: |
          git config user.name "RonakSurana-2001"
          git config user.email "ronaksurana2017@gmail.com"

          git fetch origin

          git checkout QA_BRANCH || git checkout -b QA_BRANCH

          LATEST_COMMIT=$(git rev-parse origin/DEV_BRANCH)

          echo "Latest DEV commit: $LATEST_COMMIT"

          git cherry-pick $LATEST_COMMIT || echo "No changes"

          # ✅ Fixed push (removed extra bracket)
          git push https://${{ github.token }}@github.com/${{ github.repository }} QA_BRANCH
