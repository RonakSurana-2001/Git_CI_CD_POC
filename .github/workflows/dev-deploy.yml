name: Deploy to Environment

permissions:
  contents: write

on:
  push:
    branches:
      - DEV_BRANCH

  workflow_dispatch:

env:
  COA_VERSION: 7.31.3

jobs:
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: DEV_ENV

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG }}' > COA_CONFIG

      - run: npm list | grep "@coalescesoftware/coa@${{ env.COA_VERSION }}" || npm install @coalescesoftware/coa@${{ env.COA_VERSION }}

      - run: npx coa --version

      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug

      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug



  merge-qa:
    name: Merge to QA
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - uses: actions/checkout@v6
      - name: Configure Git
        run: |
          git config user.name "RonakSurana-2001"
          git config user.email "ronaksurana2017@gmail.com"
          git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin
          git checkout QA_BRANCH
          git merge origin/DEV_BRANCH --allow-unrelated-histories -X theirs -m "Merge DEV into QA"
          git push origin QA_BRANCH
          
      - name: Trigger QA Deployment Workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use gh CLI to trigger the QA workflow on the specific QA_BRANCH ref
          gh workflow run "QA Deployment" --ref QA_BRANCH
