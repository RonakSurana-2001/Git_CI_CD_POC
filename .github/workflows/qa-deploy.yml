name: QA Deployment

permissions:
  contents: write

on:
  workflow_dispatch: 

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    environment: QA_ENV 

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0

      - run: echo '${{ secrets.COA_CONFIG_QA }}' > COA_CONFIG
      - run: npm install @coalescesoftware/coa@7.31.3
      - run: npx coa plan --config COA_CONFIG --out ./coa-plan --debug
      - run: npx coa deploy --config COA_CONFIG --plan ./coa-plan --debug

  merge-prod:
    name: Merge to PROD
    runs-on: ubuntu-latest
    needs: deploy-qa

    steps:
      - uses: actions/checkout@v6
      - name: Configure Git
        run: |
          git config user.name "RonakSurana-2001"
          git config user.email "ronaksurana2017@gmail.com"
          git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin
          git checkout PROD_BRANCH
          git merge origin/QA_BRANCH --allow-unrelated-histories -X theirs -m "Merge QA into PROD"
          git push origin PROD_BRANCH
          
      - name: Trigger PROD Deployment Workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use gh CLI to trigger the PROD workflow on the specific PROD_BRANCH ref
          gh workflow run "PROD Deployment" --ref PROD_BRANCH
